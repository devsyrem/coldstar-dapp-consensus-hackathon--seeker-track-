<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- iOS Specific Meta Tags -->
    <meta name="apple-mobile-web-app-title" content="Coldstar" />
    
    <!-- Prevent text size adjustment on iOS -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="date=no" />
    <meta name="format-detection" content="address=no" />
    <meta name="format-detection" content="email=no" />
    
    <title>Coldstar Wallet</title>
    
    <style>
      /* Critical CSS for mobile app */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed;
        overscroll-behavior: none;
        background-color: #000000;
      }
      
      /* iOS Safe Area Support */
      :root {
        --safe-area-inset-top: env(safe-area-inset-top);
        --safe-area-inset-bottom: env(safe-area-inset-bottom);
        --safe-area-inset-left: env(safe-area-inset-left);
        --safe-area-inset-right: env(safe-area-inset-right);
      }
      
      #root {
        width: 100%;
        height: 100%;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }
      
      /* Disable pull-to-refresh on Chrome/Android */
      body {
        overscroll-behavior-y: contain;
      }
      
      /* Loading screen */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #000000;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <div style="text-align: center;">
          <div style="font-size: 48px; margin-bottom: 16px;">❄️</div>
          <div style="font-size: 18px; font-weight: 600;">Coldstar</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
